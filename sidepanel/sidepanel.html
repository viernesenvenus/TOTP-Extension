<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTP Authenticator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header>
      <button id="settings-btn" class="icon-btn" title="Administrar cuentas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <!-- Vista principal de cuentas -->
    <main id="main-view">
      <div id="search-box" class="search-box hidden">
        <input type="text" id="search-input" placeholder="Buscar cuentas...">
      </div>

      <div id="accounts-list" class="accounts-list">
        <!-- Se llena dinamicamente -->
      </div>

      <div id="empty-state" class="empty-state hidden">
        <p>No hay cuentas configuradas</p>
        <button id="add-first-btn" class="btn-primary">Agregar cuenta</button>
      </div>
    </main>

    <!-- Vista de configuraciones -->
    <div id="settings-view" class="settings-view hidden">
      <div class="settings-header">
        <button id="back-btn" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2>Administrar cuentas</h2>
      </div>
      <div id="settings-list" class="settings-list">
        <!-- Lista de cuentas para eliminar -->
      </div>
    </div>

    <!-- Footer con boton agregar -->
    <footer id="footer">
      <button id="add-btn" class="btn-primary">+ Agregar cuenta</button>
    </footer>

    <!-- Modal agregar cuenta -->
    <div id="add-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Nueva cuenta</h2>
          <button id="close-modal" class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Tabs -->
        <div class="modal-tabs">
          <button class="tab active" data-tab="qr">Escanear QR</button>
          <button class="tab" data-tab="manual">Manual</button>
        </div>

        <!-- Tab QR -->
        <div id="tab-qr" class="tab-content active">
          <div class="qr-upload">
            <div class="qr-dropzone" id="qr-dropzone">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="3" height="3"/>
                <rect x="18" y="14" width="3" height="3"/>
                <rect x="14" y="18" width="3" height="3"/>
                <rect x="18" y="18" width="3" height="3"/>
              </svg>
              <p>Arrastra una imagen QR aqui</p>
              <span>o</span>
              <button type="button" id="qr-select-btn" class="btn-secondary">Seleccionar archivo</button>
              <input type="file" id="qr-file" accept="image/*" hidden>
            </div>
            <div id="qr-preview" class="qr-preview hidden">
              <img id="qr-image" alt="QR Preview">
              <div id="qr-status" class="qr-status"></div>
            </div>
          </div>
        </div>

        <!-- Tab Manual -->
        <div id="tab-manual" class="tab-content">
          <form id="add-form">
            <div class="form-group">
              <label for="platform">Plataforma</label>
              <input type="text" id="platform" placeholder="Google, GitHub, AWS...">
            </div>
            <div class="form-group">
              <label for="account">Cuenta / Email</label>
              <input type="text" id="account" placeholder="usuario@email.com">
            </div>
            <div class="form-group">
              <label for="secret">Clave secreta (Base32)</label>
              <input type="text" id="secret" placeholder="JBSWY3DPEHPK3PXP">
            </div>
            <button type="submit" class="btn-primary">Guardar</button>
          </form>
        </div>
      </div>
    </div>

    <canvas id="qr-canvas" hidden></canvas>
  </div>

  <script src="../libs/otpauth-9.1.3.min.js"></script>
  <script src="../libs/jsqr.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
