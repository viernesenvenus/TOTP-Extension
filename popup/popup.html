<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTP Authenticator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>Cuentas</h1>
      <button id="settings-btn" class="icon-btn" title="Administrar cuentas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <!-- Vista principal de cuentas -->
    <main id="main-view">
      <div id="accounts-list" class="accounts-list">
        <!-- Se llena dinamicamente -->
      </div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-state-icon">🔐</div>
        <h2>Tus códigos MFA en un clic</h2>
        <p>Olvídate de buscar el celular. Copia tus códigos de verificación directo desde el navegador.</p>
        <button id="add-first-btn" class="btn-primary">Comenzar</button>
      </div>
    </main>

    <!-- Vista de configuraciones -->
    <div id="settings-view" class="settings-view hidden">
      <div class="settings-header">
        <button id="back-btn" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2>Administrar cuentas</h2>
      </div>
      <div id="settings-list" class="settings-list">
        <!-- Lista de cuentas para eliminar -->
      </div>
    </div>

    <!-- Footer con boton agregar -->
    <footer id="footer">
      <button id="add-btn" class="btn-primary">+ Agregar cuenta</button>
      <div class="security-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>Almacenamiento local y cifrado</span>
      </div>
    </footer>

    <!-- Modal agregar cuenta -->
    <div id="add-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Nueva cuenta</h2>
          <button id="close-modal" class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Tabs -->
        <div class="modal-tabs">
          <button class="tab active" data-tab="qr">Escanear QR</button>
          <button class="tab" data-tab="manual">Manual</button>
        </div>

        <!-- Tab QR -->
        <div id="tab-qr" class="tab-content active">
          <div class="qr-options">
            <button type="button" id="capture-btn" class="qr-option-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>Capturar pantalla</span>
              <small>Escanea QR de la pagina actual</small>
            </button>
            <button type="button" id="upload-btn" class="qr-option-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
              <span>Subir imagen</span>
              <small>Selecciona un archivo QR</small>
            </button>
            <input type="file" id="qr-file" accept="image/*" hidden>
          </div>
          <div id="qr-preview" class="qr-preview hidden">
            <img id="qr-image" alt="QR Preview">
            <div id="qr-status" class="qr-status"></div>
            <button type="button" id="qr-retry" class="btn-secondary">Intentar de nuevo</button>
          </div>
        </div>

        <!-- Tab Manual -->
        <div id="tab-manual" class="tab-content">
          <form id="add-form">
            <div class="form-group">
              <label for="platform">Plataforma</label>
              <input type="text" id="platform" placeholder="Google, GitHub, AWS...">
            </div>
            <div class="form-group">
              <label for="account">Cuenta / Email</label>
              <input type="text" id="account" placeholder="usuario@email.com">
            </div>
            <div class="form-group">
              <label for="secret">Clave secreta (Base32)</label>
              <input type="text" id="secret" placeholder="JBSWY3DPEHPK3PXP">
            </div>
            <button type="submit" class="btn-primary">Guardar</button>
          </form>
        </div>
      </div>
    </div>

    <canvas id="qr-canvas" hidden></canvas>
  </div>

  <script src="../libs/browser-polyfill.js"></script>
  <script src="../libs/otpauth-9.1.3.min.js"></script>
  <script src="../libs/jsqr.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
