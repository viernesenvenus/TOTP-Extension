<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar 2FA - TOTP Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
      <!-- Header -->
      <div class="text-center space-y-2">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-600 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Configurar Autenticación</h1>
        <p class="text-gray-600">Escanea el código QR con tu extensión</p>
      </div>

      <!-- QR Code -->
      <div class="bg-gray-50 rounded-xl p-6">
        <div class="flex justify-center mb-4">
          <div id="qrcode" class="bg-white p-4 rounded-lg"></div>
        </div>

        <!-- Secret Key -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-gray-700">O ingresa la clave manualmente:</label>
          <div class="flex items-center gap-2">
            <input
              type="text"
              id="secretKey"
              readonly
              class="flex-1 px-4 py-2 bg-white border border-gray-300 rounded-lg font-mono text-sm"
            >
            <button
              onclick="copySecret()"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Info Steps -->
      <div class="space-y-3">
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">1</div>
          <p class="text-sm text-gray-700 pt-0.5">Abre tu extensión TOTP Authenticator</p>
        </div>
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">2</div>
          <p class="text-sm text-gray-700 pt-0.5">Escanea este código QR o ingresa la clave</p>
        </div>
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">3</div>
          <p class="text-sm text-gray-700 pt-0.5">Dirígete a la página de login para probar</p>
        </div>
      </div>

      <!-- Account Info -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 space-y-2">
        <h3 class="font-medium text-blue-900">Credenciales de Demo</h3>
        <div class="text-sm text-blue-800 space-y-1">
          <p><span class="font-semibold">Email:</span> demo@example.com</p>
          <p><span class="font-semibold">Password:</span> demo123</p>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-3">
        <a href="index.html" class="flex-1 px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-center font-medium">
          Volver
        </a>
        <a href="login.html" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-center font-medium">
          Ir a Login
        </a>
      </div>
    </div>
  </div>

  <script>
    // Generar un secreto TOTP (base32)
    const secret = 'JBSWY3DPEHPK3PXP'; // Secreto fijo para demo
    const issuer = 'TOTP Demo';
    const account = 'demo@example.com';

    // Construir URI para QR
    const otpauth = `otpauth://totp/${encodeURIComponent(issuer)}:${encodeURIComponent(account)}?secret=${secret}&issuer=${encodeURIComponent(issuer)}`;

    // Generar QR Code
    new QRCode(document.getElementById("qrcode"), {
      text: otpauth,
      width: 200,
      height: 200,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    // Mostrar secreto
    document.getElementById('secretKey').value = secret;

    // Copiar secreto
    function copySecret() {
      const secretInput = document.getElementById('secretKey');
      secretInput.select();
      document.execCommand('copy');

      // Feedback visual
      const button = event.target.closest('button');
      const originalHTML = button.innerHTML;
      button.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
      button.classList.add('bg-green-600');
      button.classList.remove('bg-blue-600');

      setTimeout(() => {
        button.innerHTML = originalHTML;
        button.classList.remove('bg-green-600');
        button.classList.add('bg-blue-600');
      }, 1500);
    }
  </script>
</body>
</html>
