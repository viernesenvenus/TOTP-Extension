<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TOTP Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-gray-900">TOTP Demo</h1>
        </div>
        <button
          onclick="logout()"
          class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors flex items-center gap-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- Success Banner -->
    <div class="bg-white border border-green-200 rounded-xl p-6 mb-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Login exitoso</h2>
      </div>
      <p class="text-gray-600 text-sm">Sesión iniciada como <span id="userEmail" class="font-medium text-gray-900"></span></p>
    </div>

    <!-- Value Props -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
      <h3 class="font-bold text-gray-900 mb-4">Qué acaba de pasar</h3>
      <div class="space-y-3">
        <div class="flex gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-xs font-bold">1</div>
          <p class="text-gray-700 text-sm pt-0.5">Configuraste 2FA escaneando el QR</p>
        </div>
        <div class="flex gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-xs font-bold">2</div>
          <p class="text-gray-700 text-sm pt-0.5">Ingresaste credenciales en el login</p>
        </div>
        <div class="flex gap-3">
          <div class="flex-shrink-0 w-6 h-6 bg-green-600 text-white rounded-full flex items-center justify-center text-xs font-bold">3</div>
          <p class="text-gray-700 text-sm pt-0.5">La extensión auto-completó el código MFA y envió el formulario</p>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 justify-center">
      <a href="login.html" onclick="sessionStorage.clear()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
        Probar de nuevo
      </a>
    </div>
  </main>

  <script>
    // Verificar autenticación
    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = 'login.html';
    }

    // Mostrar email del usuario
    const userEmail = sessionStorage.getItem('userEmail') || 'usuario@example.com';
    document.getElementById('userEmail').textContent = userEmail;

    // Función de logout
    function logout() {
      sessionStorage.clear();
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
