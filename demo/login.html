<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TOTP Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
      <!-- Header -->
      <div class="text-center space-y-2">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Iniciar Sesión</h1>
        <p class="text-gray-600">Ingresa tus credenciales y código 2FA</p>
      </div>

      <!-- Alerts -->
      <div id="alert" class="hidden"></div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <!-- Email -->
        <div class="space-y-2">
          <label for="email" class="block text-sm font-medium text-gray-700">
            Correo Electrónico
          </label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="demo@example.com"
          >
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label for="password" class="block text-sm font-medium text-gray-700">
            Contraseña
          </label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="••••••••"
          >
        </div>

        <!-- 2FA Code -->
        <div class="space-y-2">
          <label for="mfa-code" class="block text-sm font-medium text-gray-700">
            Código de Autenticación (6 dígitos)
          </label>
          <input
            type="text"
            id="mfa-code"
            name="mfa-code"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            required
            autocomplete="one-time-code"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-mono text-lg tracking-widest text-center"
            placeholder="000000"
          >
          <p class="text-xs text-gray-500 flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Usa tu extensión TOTP para auto-completar
          </p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all font-medium disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
          Iniciar Sesión
        </button>
      </form>

      <!-- Help -->
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
        <div class="flex gap-3">
          <svg class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div class="text-sm text-amber-800">
            <p class="font-medium mb-1">¿No configuraste 2FA aún?</p>
            <a href="setup.html" class="text-amber-900 underline hover:text-amber-700">Ve a la página de configuración</a>
          </div>
        </div>
      </div>

      <!-- Demo Credentials -->
      <div class="text-center pt-2">
        <button
          type="button"
          onclick="fillDemoCredentials()"
          class="text-sm text-gray-600 hover:text-blue-600 underline"
        >
          Usar credenciales de demo
        </button>
      </div>

      <!-- Back -->
      <div class="text-center">
        <a href="index.html" class="text-sm text-gray-600 hover:text-blue-600">
          ← Volver al inicio
        </a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const mfaInput = document.getElementById('mfa-code');
    const submitBtn = document.getElementById('submitBtn');
    const alertDiv = document.getElementById('alert');

    // Credenciales válidas (fake)
    const VALID_CREDENTIALS = {
      email: 'demo@example.com',
      password: 'demo123'
    };

    // Mostrar alerta
    function showAlert(message, type = 'error') {
      alertDiv.className = `p-4 rounded-lg ${
        type === 'error'
          ? 'bg-red-50 border border-red-200 text-red-800'
          : type === 'success'
          ? 'bg-green-50 border border-green-200 text-green-800'
          : 'bg-blue-50 border border-blue-200 text-blue-800'
      }`;
      alertDiv.textContent = message;
      alertDiv.classList.remove('hidden');

      if (type === 'success') {
        setTimeout(() => alertDiv.classList.add('hidden'), 2000);
      }
    }

    // Llenar credenciales de demo
    function fillDemoCredentials() {
      emailInput.value = VALID_CREDENTIALS.email;
      passwordInput.value = VALID_CREDENTIALS.password;
      mfaInput.focus();
    }

    // Detectar auto-completado del código MFA
    let autoSubmitTimer;
    mfaInput.addEventListener('input', function(e) {
      // Solo números
      this.value = this.value.replace(/[^0-9]/g, '');

      // Si llegó a 6 dígitos, auto-submit después de un breve delay
      if (this.value.length === 6) {
        clearTimeout(autoSubmitTimer);

        // Feedback visual
        this.classList.add('ring-2', 'ring-green-500', 'border-green-500');

        // Auto-submit después de 500ms
        autoSubmitTimer = setTimeout(() => {
          if (emailInput.value && passwordInput.value) {
            form.requestSubmit();
          }
        }, 500);
      } else {
        this.classList.remove('ring-2', 'ring-green-500', 'border-green-500');
        clearTimeout(autoSubmitTimer);
      }
    });

    // Submit form
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      alertDiv.classList.add('hidden');

      const email = emailInput.value;
      const password = passwordInput.value;
      const mfaCode = mfaInput.value;

      // Validar credenciales
      if (email !== VALID_CREDENTIALS.email) {
        showAlert('Email incorrecto', 'error');
        return;
      }

      if (password !== VALID_CREDENTIALS.password) {
        showAlert('Contraseña incorrecta', 'error');
        return;
      }

      // Validar código MFA (cualquier código de 6 dígitos es válido para demo)
      if (!/^\d{6}$/.test(mfaCode)) {
        showAlert('Código MFA inválido. Debe tener 6 dígitos.', 'error');
        return;
      }

      // Login exitoso
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      `;

      showAlert('Verificando...', 'info');

      // Simular verificación
      setTimeout(() => {
        showAlert('¡Acceso concedido!', 'success');

        // Guardar sesión
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('userEmail', email);

        // Redirigir
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      }, 1000);
    });

    // Verificar si ya está logueado
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
